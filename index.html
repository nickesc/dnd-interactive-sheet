<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DnD Sheet</title>
        <link rel="stylesheet" href="src/global.css" />
        <link rel="stylesheet" href="src/sections.css" />
        <link rel="stylesheet" href="src/visuals.css" />
        <link rel="stylesheet" href="src/info-body.css" />
        <link rel="stylesheet" href="src/fonts/index.css" />
        <link rel="stylesheet" href="src/footer.css" />
        <script src="src/visuals.js"></script>
        <script defer src="src/inputs.js"></script>
    </head>
    <body>
        <header>
            <h1 hidden>DnD Personality Sheet</h1>
        </header>
        <main>
            <div id="top" class="split-row">
                <section id="character-visuals" class="left-split column">
                    <h2 hidden>Character Visual Information</h2>
                    <div id="portrait-palette-container">
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="img/placeholder.svg" alt="Character Portrait" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                        <div id="character-palette" class="character-palette row">
                            <button id="remove-color-button" class="clickable palette-button" onclick="removeColor()">
                                <span class="minus-cross"></span>
                            </button>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <button id="add-color-button" class="clickable palette-button" onclick="addColor()">
                                <span class="plus-cross"></span>
                                <span class="minus-cross"></span>
                            </button>
                        </div>
                    </div>

                    <div id="character-images" class="character-images row">
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="img/placeholder.svg" alt="Character Image 1" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="img/placeholder.svg" alt="Character Image 2" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                    </div>
                </section>
                <div id="info-body" class="column">
                    <section id="character-info">
                        <h2 hidden>Character Information</h2>
                        <div class="text-input input-row">
                            <label for="character-name" class="input-label">Name:</label>
                            <input class="text-input" id="character-name" name="character-name" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-nickname" class="input-label">Nickname:</label>
                            <input class="text-input" id="character-nickname" name="character-nickname" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-race" class="input-label">Race/Species:</label>
                            <input class="text-input" id="character-race" name="character-race" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-age" class="input-label">Age:</label>
                            <input class="text-input" id="character-age" name="character-age" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-gender" class="input-label">Gender:</label>
                            <input class="text-input" id="character-gender" name="character-gender" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-alignment" class="input-label">Alignment:</label>
                            <input class="text-input" id="character-alignment" name="character-alignment" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-class" class="input-label">Class/Job:</label>
                            <input class="text-input" id="character-class" name="character-class" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                        </div>
                    </section>
                    <section id="character-body" class="right-split container">
                        <h2><span class="heading-bg">Body</span></h2>
                        <div class="row">
                            <div class="column" id="body-left">
                                <div class="text-input input-row">
                                    <input class="text-input" id="character-height" name="character-height" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
                                    <label for="character-height" class="input-label">Height</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Strength</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Dexterity</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Health</label>
                                </div>
                            </div>
                            <div class="column" id="body-right">
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Energy</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Beauty</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Style</label>
                                </div>
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label class="input-label">Hygiene</label>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
            <div id="mid-upper" class="split-row">
                <section id="character-skills" class="left-split container column">
                    <h2><span class="heading-bg">Skills</span></h2>
                    <div class="column">
                        <div class="radio-input input-row">
                            <div class="radio-input-container row">
                                <input type="radio" />
                                <input type="radio" />
                                <input type="radio" />
                            </div>
                            <label class="input-label">Energy</label>
                        </div>
                        <div class="radio-input input-row">
                            <div class="radio-input-container row">
                                <input type="radio" />
                                <input type="radio" />
                                <input type="radio" />
                            </div>
                            <label class="input-label">Beauty</label>
                        </div>
                        <div class="radio-input input-row">
                            <div class="radio-input-container row">
                                <input type="radio" />
                                <input type="radio" />
                                <input type="radio" />
                            </div>
                            <label class="input-label">Style</label>
                        </div>
                        <div class="radio-input input-row">
                            <div class="radio-input-container row">
                                <input type="radio" />
                                <input type="radio" />
                                <input type="radio" />
                            </div>
                            <label class="input-label">Hygiene</label>
                        </div>
                    </div>
                </section>
                <section id="character-mind" class="container right-split column">
                    <h2><span class="heading-bg">Mind</span></h2>
                </section>
            </div>
            <div id="mid-lower" class="split-row">
                <section id="character-social" class="right-split container column">
                    <h2><span class="heading-bg">Social</span></h2>
                </section>
            </div>
            <div id="bottom" class="split-row">
                <section id="character-beliefs" class="left-split container column">
                    <h2><span class="heading-bg">Beliefs</span></h2>
                </section>
                <section id="character-priorities" class="container right-split column">
                    <h2><span class="heading-bg">Priorities</span></h2>
                </section>
            </div>
        </main>
        <footer class="column">
            <div class="text-input input-row">
                <label for="character-author-name" class="input-label">Character by</label>
                <input class="text-input" id="character-author-name" name="character-author-name" type="text" autocomplete="off" data-lpignore="true" data-form-type="other" />
            </div>
            <span>Based on a <a href="img/template.png" target="_blank">template</a> by <a href="https://cparrisart.tumblr.com/" target="_blank">cparrisart</a></span>
        </footer>
    </body>
</html>
