<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DnD Sheet</title>
        <link rel="stylesheet" href="src/global.css" />
        <link rel="stylesheet" href="src/sections.css" />
        <link rel="stylesheet" href="src/visuals.css" />
        <link rel="stylesheet" href="src/info-body.css" />
        <link rel="stylesheet" href="src/fonts/index.css" />
        <script src="src/visuals.js"></script>
    </head>
    <body>
        <header>
            <h1 hidden>DnD Personality Sheet</h1>
        </header>
        <main>
            <div id="top">
                <section id="character-visuals" class="character-visuals column">
                    <h2 hidden>Character Visual Information</h2>
                    <div id="portrait-palette-container">
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="src/img/placeholder.svg" alt="Character Portrait" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                        <div id="character-palette" class="character-palette row">
                            <button id="remove-color-button" class="clickable palette-button" onclick="removeColor()">
                                <span class="minus-cross"></span>
                            </button>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <div class="character-palette-circle clickable" onclick="this.querySelector('input[type=color]').click()">
                                <input class="hidden-input" type="color" onchange="updatePaletteColor(event)" />
                            </div>
                            <button id="add-color-button" class="clickable palette-button" onclick="addColor()">
                                <span class="plus-cross"></span>
                                <span class="minus-cross"></span>
                            </button>
                        </div>
                    </div>

                    <div id="character-images" class="character-images row">
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="src/img/placeholder.svg" alt="Character Image 1" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                        <div class="image-container clickable" onclick="this.querySelector('input[type=file]').click()">
                            <img src="src/img/placeholder.svg" alt="Character Image 2" />
                            <input class="hidden-input" type="file" accept="image/*" onchange="updateImage(event)" hidden />
                        </div>
                    </div>
                </section>
                <div id="info-body" class="column">
                    <section id="character-info">
                        <h2 hidden>Character Information</h2>
                        <div class="text-input input-row">
                            <label for="character-name" class="input-label">Name:</label>
                            <input class="text-input" id="character-name" name="character-name" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-nickname" class="input-label">Nickname:</label>
                            <input class="text-input" id="character-nickname" name="character-nickname" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-race" class="input-label">Race/Species:</label>
                            <input class="text-input" id="character-race" name="character-race" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-age" class="input-label">Age:</label>
                            <input class="text-input" id="character-age" name="character-age" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-gender" class="input-label">Gender:</label>
                            <input class="text-input" id="character-gender" name="character-gender" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-alignment" class="input-label">Alignment:</label>
                            <input class="text-input" id="character-alignment" name="character-alignment" type="text" />
                        </div>
                        <div class="text-input input-row">
                            <label for="character-class" class="input-label">Class/Job:</label>
                            <input class="text-input" id="character-class" name="character-class" type="text" />
                        </div>
                    </section>
                    <section id="character-body" class="container">
                        <h2><span class="heading-bg">Body</span></h2>
                        <div class="row">
                            <div class="column" id="body-left">
                                <div class="text-input input-row">
                                    <input class="text-input" id="character-height" name="character-height" type="text" />
                                    <label for="character-height" class="input-label">Height</label>
                                </div>
                            </div>
                            <div class="column" id="body-right">
                                <div class="radio-input input-row">
                                    <div class="radio-input-container row">
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                        <input type="radio" />
                                    </div>
                                    <label for="character-height" class="input-label">Energy</label>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </body>
</html>
